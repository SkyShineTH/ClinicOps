# Continuous integration for every push and pull request:
# install, lint, typecheck, production build, Docker image build, and a compose smoke test.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Next.js build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Docker image build
        run: docker build --tag clinicops:${{ github.sha }} .

      - name: Docker Compose full-stack smoke test
        run: |
          trap 'docker compose down --volumes --remove-orphans' EXIT
          docker compose up --detach --build --wait

          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/api/ready > /tmp/clinicops-ready.json; then
              cat /tmp/clinicops-ready.json
              npm run smoke:staff
              exit 0
            fi
            sleep 2
          done

          echo "Readiness endpoint did not respond in time"
          docker compose logs
          exit 1
        env:
          STAFF_API_TOKEN: ci-staff-smoke-token
