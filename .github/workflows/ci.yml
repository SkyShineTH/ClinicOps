# Continuous integration: lint + production build on every push and PR.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Next.js build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Docker image build
        run: docker build --tag clinicops:${{ github.sha }} .

      - name: Docker health smoke test
        run: |
          docker run --detach --name clinicops-ci --publish 3000:3000 clinicops:${{ github.sha }}
          trap 'docker rm --force clinicops-ci >/dev/null 2>&1 || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:3000/api/health > /tmp/clinicops-health.json; then
              cat /tmp/clinicops-health.json
              exit 0
            fi
            sleep 2
          done

          echo "Health endpoint did not respond in time"
          docker logs clinicops-ci
          exit 1
